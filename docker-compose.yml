services:
  app:
    build: .
    container_name: property_rental_api
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
    networks:
      - demo_proxy
      - proxy

networks:
  demo_proxy:
    external: true
    name: demo_proxy

  proxy:
    external: true
    name: proxy
