spring.application.name=PropertyRentalApi

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8000

spring.jwt-secret=${SPRING_JWT_SECRET}
spring.access-token-expire=${SPRING_ACCESS_TOKEN_EXPIRE}
spring.refresh-token-expire=${SPRING_REFRESH_TOKEN_EXPIRE}

# Multipart file upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom property for your upload directory
file.upload-dir=uploads

